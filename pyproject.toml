[tool.ruff]
line-length = 88 # Match Black's formatting
src = ["supertokens_python"]
# Match setup.py's python_requires=">=3.8" so ruff-format doesn't emit
# 3.9+ syntax (e.g. parenthesized `with` statements).
target-version = "py38"

[tool.ruff.lint]
extend-select = [
    "I", # enable import sorting
    "RUF022", # Sort __all__ exports
]

[tool.ruff.format]
quote-style = "double" # Default
indent-style = "space" # Default

[tool.pyright]
typeCheckingMode = "strict"
reportImportCycles = false
include = ["supertokens_python/", "tests/", "examples/"]

[tool.pytest.ini_options]
addopts = " -v -p no:warnings"
python_paths = "."
xfail_strict = true
# Removes requirement to use `@mark.asyncio` on async tests
asyncio_mode = "auto"
