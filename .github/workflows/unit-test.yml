name: "Unit Tests"

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled
  push:
    branches:
      - '[0-9]+.[0-9]+'
    paths-ignore:
      - '**.md'
      - 'docs/**'

# Only one instance of this workflow will run on the same ref (PR/Branch/Tag)
# Previous runs will be cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  skip-check:
    runs-on: ubuntu-latest
    outputs:
      should-skip: ${{ steps.skip.outputs.should_skip }}
    steps:
      - uses: fkirc/skip-duplicate-actions@v5
        id: skip
        with:
          # Only consider the source tree, not changelog/docs/html
          paths: '["supertokens_python/**", "tests/**", "setup.py", "*.cfg", "*.toml"]'
          # On push events, skip if an identical tree already produced a passing run
          # (e.g. the same code was just tested via a dev PR)
          skip_after_successful_duplicate: 'true'
          # Never skip on pull_request — the label gate below handles that instead
          do_not_skip: '["pull_request"]'

  define-versions:
    if: |
      needs.skip-check.outputs.should-skip != 'true' &&
      (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-tests'))
    needs: skip-check
    runs-on: ubuntu-latest

    outputs:
      coreCdiVersionMap: ${{ steps.core-versions.outputs.cdiVersions }}
      testMatrix: ${{ steps.matrix.outputs.testMatrix }}

    steps:
      - uses: actions/checkout@v4

      - uses: supertokens/get-supported-versions-action@main
        id: versions
        with:
          has-fdi: true
          has-cdi: true

      - uses: supertokens/actions/get-versions-from-repo@main
        id: core-versions
        with:
          repo: supertokens-core
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cdi-versions: ${{steps.versions.outputs.cdiVersions }}

      - name: Compute boundary test matrix
        id: matrix
        run: |
          py_versions='["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]'
          cdi_versions='${{ steps.versions.outputs.cdiVersions }}'
          latest_cdi=$(echo "$cdi_versions" | jq -r '.[-1]')
          latest_py="3.13"

          # All Python versions × latest CDI (covers Python compat)
          boundary=$(echo "$py_versions" | jq --arg cdi "$latest_cdi" \
            '[.[] | {"py-version": ., "cdi-version": $cdi}]')

          # All other CDI versions × latest Python (covers CDI compat, avoids duplicate)
          extra=$(echo "$cdi_versions" | jq --arg py "$latest_py" --arg latest "$latest_cdi" \
            '[.[] | select(. != $latest) | {"py-version": $py, "cdi-version": .}]')

          testMatrix=$(jq -nc --argjson a "$boundary" --argjson b "$extra" \
            '{"include": ($a + $b)}')

          echo "testMatrix=$testMatrix" >> $GITHUB_OUTPUT

  # Required status check for PRs. Enforces that every PR explicitly opts in to
  # tests ('run-tests' label) or explicitly opts out ('skip-tests' label).
  # Prevents accidentally merging untested code by forgetting to add a label.
  # Release PRs are exempt — they carry 'Skip-Changelog' and tests ran on dev.
  test-gate:
    runs-on: ubuntu-latest
    needs: [test]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Evaluate test requirement
        env:
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
          TEST_RESULT: ${{ needs.test.result }}
        run: |
          has_run_tests=$(echo "$LABELS"    | jq 'contains(["run-tests"])')
          has_skip_tests=$(echo "$LABELS"   | jq 'contains(["skip-tests"])')
          is_release_pr=$(echo "$LABELS"    | jq 'contains(["Skip-Changelog"])')

          if [[ "$is_release_pr" == "true" ]]; then
            echo "Release PR — tests ran on dev branch."
            exit 0
          elif [[ "$has_skip_tests" == "true" ]]; then
            echo "Tests explicitly skipped via 'skip-tests' label."
            exit 0
          elif [[ "$has_run_tests" == "true" ]]; then
            if [[ "$TEST_RESULT" == "success" ]]; then
              echo "Tests passed."
              exit 0
            else
              echo "::error::Tests did not pass (result: $TEST_RESULT)."
              exit 1
            fi
          else
            echo "::error::No test label found. Add 'run-tests' to run tests, or 'skip-tests' to explicitly bypass."
            exit 1
          fi

  test:
    if: |
      needs.skip-check.outputs.should-skip != 'true' &&
      (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-tests'))
    runs-on: ubuntu-latest
    needs: [skip-check, define-versions]

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.define-versions.outputs.testMatrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Get core version from current CDI version
        id: core-version
        run: |
          coreVersion=$(echo '${{ needs.define-versions.outputs.coreCdiVersionMap }}' | jq -r '.["${{ matrix.cdi-version }}"]')

          echo "coreVersion=${coreVersion}" >> $GITHUB_OUTPUT

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py-version }}

      - name: Create virtual environment and install dependencies
        # Updrade `pip` and `setuptools` to have the latest versions before further installs
        run: |
          python3 -m venv venv
          source venv/bin/activate
          python3 -m pip install pip setuptools --upgrade
          make dev-install && rm -rf src

      - name: Run unit tests
        run: |
          source venv/bin/activate
          make test
        env:
          SUPERTOKENS_CORE_VERSION: ${{ steps.core-version.outputs.coreVersion }}

      - uses: pmeier/pytest-results-action@main
        name: Surface failing tests
        if: always()
        with:
          path: test-results/junit.xml
          summary: true
          title: "[Core=${{ steps.core-version.outputs.coreVersion }}][py=${{ matrix.py-version }}] Unit Test Results"
