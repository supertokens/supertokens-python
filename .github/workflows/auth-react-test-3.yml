name: Auth-React Tests - L3
on:
  workflow_call:
    inputs:
      fdi-version:
        description: "FDI Version for this set of tests"
        required: true
        type: string

      matrix:
        description: "Matrix"
        required: true
        type: string

      AUTH_REACT__LOG_DIR:
        description: AUTH_REACT__LOG_DIR
        required: true
        type: string

      AUTH_REACT__SCREENSHOT_DIR:
        description: AUTH_REACT__SCREENSHOT_DIR
        required: true
        type: string

      AUTH_REACT__APP_SERVER:
        description: AUTH_REACT__APP_SERVER
        required: true
        type: string

      AUTH_REACT__NODE_PORT:
        description: AUTH_REACT__NODE_PORT
        required: true
        type: string

      AUTH_REACT__TEST_MODE:
        description: AUTH_REACT__TEST_MODE
        required: true
        type: string

      AUTH_REACT__PORT:
        description: AUTH_REACT__PORT
        required: true
        type: string


jobs:
  test:
    if: inputs.matrix != '{"include":[]}'
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 10
      fail-fast: false # Don't fail fast to avoid locking TF State
      matrix: ${{ fromJson(inputs.matrix) }}

    env:
      SUPERTOKENS_CORE_PORT: 3567
      SUPERTOKENS_CORE_HOST: localhost
      TEST_MODE: testing
      # Auth react setup envs
      AUTH_REACT__LOG_DIR: ${{ inputs.AUTH_REACT__LOG_DIR }}
      AUTH_REACT__SCREENSHOT_DIR: ${{ inputs.AUTH_REACT__SCREENSHOT_DIR }}
      AUTH_REACT__APP_SERVER: ${{ inputs.AUTH_REACT__APP_SERVER }}
      AUTH_REACT__NODE_PORT: ${{ inputs.AUTH_REACT__NODE_PORT }}
      AUTH_REACT__TEST_MODE: ${{ inputs.AUTH_REACT__TEST_MODE }}
      AUTH_REACT__PORT: ${{ inputs.AUTH_REACT__PORT }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Checking out to a custom path since the test repo will also be cloned
          path: supertokens-python

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py-version }}
          cache: 'pip'
          cache-dependency-path: |
            supertokens-python/dev-requirements.txt
            supertokens-python/setup.py

      - name: Create virtual environment and install dependencies
        working-directory: supertokens-python
        # Upgrade `pip` and `setuptools` to have the latest versions before further installs
        run: |
          python3 -m venv venv
          source venv/bin/activate
          python3 -m pip install pip setuptools --upgrade
          make dev-install && rm -rf src

      - name: Get supported Python CDI versions
        id: cdi-versions
        uses: supertokens/actions/get-supported-versions-action@main
        with:
            has-cdi: true
            working-directory: supertokens-python

      - uses: supertokens/actions/get-versions-from-repo@main
        id: core-versions
        with:
          repo: supertokens-core
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cdi-versions: ${{ steps.cdi-versions.outputs.cdiVersions }}

      - name: Get core version from latest Python CDI version
        id: core-version
        run: |
          lastPythonCdiVersion=$(echo '${{ steps.cdi-versions.outputs.cdiVersions }}' | jq -r '.[-1]' | sed -e 's/"/\\"/g')
          coreVersion=$(echo '${{ steps.core-versions.outputs.cdiVersions }}' | jq -r ".[\"$lastPythonCdiVersion\"]")

          echo "coreVersion=${coreVersion}" >> $GITHUB_OUTPUT

      - name: Start core
        working-directory: supertokens-python
        env:
          SUPERTOKENS_CORE_VERSION: ${{ steps.core-version.outputs.coreVersion }}
        run: docker compose up --wait

      - name: Start Server (django)
        if: matrix.framework == 'django'
        working-directory: supertokens-python
        run: |
          source venv/bin/activate
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          make with-django
          cd tests/auth-react/django3x

          mkdir -p $AUTH_REACT__LOG_DIR
          uvicorn mysite.asgi:application --port 8083 &> $AUTH_REACT__LOG_DIR/django.log &

      - name: Start Server (fastapi)
        if: matrix.framework == 'fastapi'
        working-directory: supertokens-python
        env:
          # Capture timing for inbound test-server requests and outbound
          # Querier calls to the core. Logs go to fastapi.log inside
          # AUTH_REACT__LOG_DIR, which the auth-react-testing-action
          # uploads as a workflow artifact. Grep for `[QUERIER]` and
          # `[REQUEST]` to surface the slowest calls. Off in other
          # frameworks/workflows; toggle here when you want data.
          LOG_TEST_TIMINGS: '1'
        run: |
          source venv/bin/activate
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          make with-fastapi
          cd tests/auth-react/fastapi-server

          mkdir -p $AUTH_REACT__LOG_DIR
          uvicorn app:app --host 0.0.0.0 --port 8083 &> $AUTH_REACT__LOG_DIR/fastapi.log &

      - name: Start Server (flask)
        if: matrix.framework == 'flask'
        working-directory: supertokens-python
        run: |
          source venv/bin/activate
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          make with-flask
          cd tests/auth-react/flask-server

          mkdir -p $AUTH_REACT__LOG_DIR
          python3 app.py --port 8083 &> $AUTH_REACT__LOG_DIR/flask.log &

      - uses: supertokens/actions/auth-react-testing-action@main
        with:
          fdi-version: ${{ inputs.fdi-version }}
          check-name-suffix: '[FDI=${{ inputs.fdi-version }}][Py=${{ matrix.py-version }}][Framework=${{ matrix.framework }}][Spec=${{ matrix.spec }}]'
          path: supertokens-auth-react
          spec: ${{ matrix.spec }}

      # The auth-react-testing-action only uploads test_report/ on failure.
      # We need the fastapi server's stdout (contains [QUERIER]/[REQUEST]
      # lines from LOG_TEST_TIMINGS) regardless of pass/fail, so explicitly
      # upload it here. fastapi-only since LOG_TEST_TIMINGS is only set on
      # that framework's Start Server step.
      - if: always() && matrix.framework == 'fastapi'
        name: Upload test-server timing logs
        uses: actions/upload-artifact@v4
        with:
          name: timing-FDI${{ inputs.fdi-version }}-${{ strategy.job-index }}
          path: ${{ env.AUTH_REACT__LOG_DIR }}/fastapi.log
          if-no-files-found: ignore
          retention-days: 7
