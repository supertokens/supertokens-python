name: "Backend SDK Tests"

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled
  push:
    branches:
      - '[0-9]+.[0-9]+'
    paths-ignore:
      - '**.md'
      - 'docs/**'

# Only one instance of this workflow will run on the same ref (PR/Branch/Tag)
# Previous runs will be cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  skip-check:
    runs-on: ubuntu-latest
    outputs:
      should-skip: ${{ steps.skip.outputs.should_skip }}
    steps:
      - uses: fkirc/skip-duplicate-actions@v5
        id: skip
        with:
          paths: '["supertokens_python/**", "tests/**", "*.cfg", "*.toml"]'
          skip_after_successful_duplicate: 'true'

  define-versions:
    if: |
      needs.skip-check.outputs.should-skip != 'true' &&
      (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-tests'))
    needs: skip-check
    runs-on: ubuntu-latest
    outputs:
      coreCdiVersionMap: ${{ steps.core-versions.outputs.cdiVersions }}
      testMatrix: ${{ steps.matrix.outputs.testMatrix }}
    steps:
      - uses: actions/checkout@v4

      - uses: supertokens/get-supported-versions-action@main
        id: versions
        with:
          has-fdi: true
          has-cdi: true

      - uses: supertokens/actions/get-versions-from-repo@main
        id: core-versions
        with:
          repo: supertokens-core
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cdi-versions: ${{steps.versions.outputs.cdiVersions }}

      - name: Compute boundary test matrix
        id: matrix
        run: |
          py_versions='["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]'
          cdi_versions='${{ steps.versions.outputs.cdiVersions }}'
          fdi_versions='${{ steps.versions.outputs.fdiVersions }}'
          latest_cdi=$(echo "$cdi_versions" | jq -r '.[-1]')
          latest_fdi=$(echo "$fdi_versions" | jq -r '.[-1]')
          latest_py="3.13"

          # Latest Python × all CDI × all FDI (covers API version compat)
          cross=$(jq -nc \
            --argjson cdis "$cdi_versions" \
            --argjson fdis "$fdi_versions" \
            --arg py "$latest_py" \
            '[$cdis[] | . as $cdi | $fdis[] | {"py-version": $py, "cdi-version": $cdi, "fdi-version": .}]')

          # All other Python × latest CDI × latest FDI (covers Python compat, avoids duplicate)
          extra=$(echo "$py_versions" | jq \
            --arg py "$latest_py" \
            --arg cdi "$latest_cdi" \
            --arg fdi "$latest_fdi" \
            '[.[] | select(. != $py) | {"py-version": ., "cdi-version": $cdi, "fdi-version": $fdi}]')

          testMatrix=$(jq -nc --argjson a "$cross" --argjson b "$extra" \
            '{"include": ($a + $b)}')

          echo "testMatrix=$testMatrix" >> $GITHUB_OUTPUT

  test-gate:
    runs-on: ubuntu-latest
    needs: [test]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Evaluate test requirement
        env:
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
          TEST_RESULT: ${{ needs.test.result }}
        run: |
          has_run_tests=$(echo "$LABELS"    | jq 'contains(["run-tests"])')
          has_skip_tests=$(echo "$LABELS"   | jq 'contains(["skip-tests"])')

          if [[ "$has_skip_tests" == "true" ]]; then
            echo "Tests explicitly skipped via 'skip-tests' label."
            exit 0
          elif [[ "$has_run_tests" == "true" ]]; then
            if [[ "$TEST_RESULT" == "success" || "$TEST_RESULT" == "skipped" ]]; then
              echo "Tests passed (result: $TEST_RESULT)."
              exit 0
            else
              echo "::error::Tests did not pass (result: $TEST_RESULT)."
              exit 1
            fi
          else
            echo "::error::No test label found. Add 'run-tests' to run tests, or 'skip-tests' to explicitly bypass."
            exit 1
          fi

  test:
    if: |
      needs.skip-check.outputs.should-skip != 'true' &&
      (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-tests'))
    runs-on: ubuntu-latest
    needs: [skip-check, define-versions]

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.define-versions.outputs.testMatrix) }}

    env:
      API_PORT: 3030
      SUPERTOKENS_CORE_PORT: 3567
      SUPERTOKENS_CORE_HOST: localhost

    steps:
      - uses: actions/checkout@v4
        with:
          # Checking out to a custom path since the test repo will also be cloned
          path: supertokens-python

      - name: Get core version from current CDI version
        id: core-version
        run: |
          coreVersion=$(echo '${{ needs.define-versions.outputs.coreCdiVersionMap }}' | jq -r '.["${{ matrix.cdi-version }}"]')

          echo "coreVersion=${coreVersion}" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Create virtual environment and install dependencies
        working-directory: supertokens-python
        # Upgrade `pip` and `setuptools` to have the latest versions before further installs
        run: |
          python3 -m venv venv
          source venv/bin/activate
          python3 -m pip install pip setuptools --upgrade
          make dev-install && rm -rf src

      - name: Start core and server
        working-directory: supertokens-python
        env:
          SUPERTOKENS_ENV: testing
          SUPERTOKENS_CORE_VERSION: ${{ steps.core-version.outputs.coreVersion }}
        run: |
          source venv/bin/activate
          docker compose up --build --wait
          mkdir -p logs/
          python3 tests/test-server/app.py &> logs/python.log &
          docker compose logs -f core &> logs/core.log &

      - uses: supertokens/backend-sdk-testing-action@main
        with:
          version: ${{ matrix.fdi-version }}
          check-name-suffix: '[CDI=${{ matrix.cdi-version }}][Core=${{ steps.core-version.outputs.coreVersion }}][FDI=${{ matrix.fdi-version }}][Py=${{ matrix.py-version }}][Node=20]'
          path: backend-sdk-testing
          app-server-logs: ${{ github.workspace }}/supertokens-python/logs
