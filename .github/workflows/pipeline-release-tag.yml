name: "Release Pipeline"

on:
  # Auto-trigger when a dev-sync release PR is merged into a version branch.
  pull_request:
    types: [closed]
    branches:
      - '[0-9]+.[0-9]+'

  # Manual trigger for overrides (skip checks, hotfixes, etc.)
  workflow_dispatch:
    inputs:
      branch:
        description: The branch to create the release tag on
        type: string
        required: true

      skip-test-checks:
        description: Skip tests passed checks
        type: boolean
        default: false
        required: false

      skip-other-version-checks:
        description: Skip server checks for core and frontend versions
        type: boolean
        default: false
        required: false

permissions:
  contents: write
  pull-requests: read


jobs:
  setup:
    # For PR events: only run when a merged PR's source branch is a release branch.
    # For workflow_dispatch: always run.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.head.ref, 'release/v'))
    runs-on: ubuntu-latest

    outputs:
      branch: ${{ steps.params.outputs.branch }}
      constantsVersion: ${{ steps.versions.outputs.constantsVersion }}
      constantsVersionXy: ${{ steps.versions.outputs.constantsVersionXy }}
      setupVersion: ${{ steps.versions.outputs.setupVersion }}
      setupVersionXy: ${{ steps.versions.outputs.setupVersionXy }}
      newestVersion: ${{ steps.versions.outputs.newestVersion }}
      targetBranch: ${{ steps.versions.outputs.targetBranch }}
      releaseTag: ${{ steps.versions.outputs.releaseTag }}
      versionFolder: ${{ steps.versions.outputs.versionFolder }}
      artifactName: ${{ steps.versions.outputs.artifactName }}

    steps:
      - name: Determine release branch
        id: params
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "branch=${{ inputs.branch }}" >> $GITHUB_OUTPUT
          else
            echo "branch=${{ github.event.pull_request.base.ref }}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.params.outputs.branch }}
          # Need a complete fetch to make the master merge check work
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.ALL_REPO_PAT }}

      - name: Populate variables
        id: versions
        run: |
          . ./hooks/populate-hook-constants.sh

          echo "constantsVersion=$constantsVersion" | tee -a "$GITHUB_OUTPUT" "$GITHUB_ENV"
          echo "constantsVersionXy=$constantsVersionXy" | tee -a "$GITHUB_OUTPUT" "$GITHUB_ENV"
          echo "setupVersion=$setupVersion" | tee -a "$GITHUB_OUTPUT" "$GITHUB_ENV"
          echo "setupVersionXy=$setupVersionXy" | tee -a "$GITHUB_OUTPUT" "$GITHUB_ENV"
          echo "newestVersion=$newestVersion" | tee -a "$GITHUB_OUTPUT" "$GITHUB_ENV"
          echo "targetBranch=$targetBranch" | tee -a "$GITHUB_OUTPUT" "$GITHUB_ENV"

          echo "releaseTag=v$setupVersion" | tee -a "$GITHUB_OUTPUT" "$GITHUB_ENV"

          echo "versionFolder=$setupVersionXy.X" | tee -a "$GITHUB_OUTPUT" "$GITHUB_ENV"
          echo "artifactName=python-docs-$setupVersion" | tee -a "$GITHUB_OUTPUT" "$GITHUB_ENV"

      - name: Setup git
        run: |
          # NOTE: The user email is {user.id}+{user.login}@users.noreply.github.com.
          # See users API: https://api.github.com/users/github-actions%5Bbot%5D
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin master

      - name: Check if branch needs master merge
        run: |
          if [[ $(git log origin/master ^HEAD) != "" ]]; then
            echo "You need to merge master into this branch."
            exit 1
          fi

      - name: Check tag and branch correctness
        run: |
          if [[ "${{ steps.versions.outputs.constantsVersion }}" != "${{ steps.versions.outputs.setupVersion }}" ]];
          then
            echo "Constants version and setup version mismatch"
            exit 1
          fi

          if [[ "${{ steps.versions.outputs.setupVersion }}" != ${{ steps.params.outputs.branch }}* ]]
          then
            echo "Adding tag to wrong branch"
            exit 1
          fi

          if git rev-parse ${{ steps.versions.outputs.releaseTag }} >/dev/null 2>&1
          then
              echo "The released version of this tag already exists."
              exit 1
          fi

  register-version:
    # Registers this version in the supertokens API with testPassed=false.
    # This replaces the old CircleCI dev-tag flow (markDevTagAsTestNotPassed.sh).
    # The entry must exist before mark-as-success can PATCH it.
    runs-on: ubuntu-latest

    needs:
      - setup

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch }}

      - name: Register version with supertokens API
        run: |
          fdiVersions=$(jq -c '.versions' frontendDriverInterfaceSupported.json)
          cdiVersions=$(jq -c '.versions' coreDriverInterfaceSupported.json)

          curl --fail-with-body -X PUT \
            https://api.supertokens.io/0/driver \
            -H 'Content-Type: application/json' \
            -H 'api-version: 0' \
            -d "{
              \"password\": \"${{ secrets.SUPERTOKENS_API_KEY }}\",
              \"version\": \"${{ needs.setup.outputs.setupVersion }}\",
              \"name\": \"python\",
              \"frontendDriverInterfaces\": $fdiVersions,
              \"coreDriverInterfaces\": $cdiVersions
            }"

  mark-as-success:
    runs-on: ubuntu-latest

    needs:
      - setup
      - register-version

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install httpx

      - name: Check tests passed on branch
        uses: supertokens/actions/check-tests-passed@main
        with:
          ref: ${{ needs.setup.outputs.branch }}
          ref-type: branch
          repository: ${{ github.repository }}
          run_id: ${{ github.run_id }}
          skip-test-checks: ${{ inputs.skip-test-checks }}

      - name: Mark tests as passed in supertokens API
        run: |
          curl --fail-with-body -X PATCH \
              https://api.supertokens.io/0/driver \
              -H 'Content-Type: application/json' \
              -H 'api-version: 0' \
              -d "{
                \"password\": \"${{ secrets.SUPERTOKENS_API_KEY }}\",
                \"version\":\"${{ needs.setup.outputs.setupVersion }}\",
                \"name\": \"python\",
                \"testPassed\": true
              }"

  release:
    runs-on: ubuntu-latest

    # This job marks the version as a release version and creates tags.
    # Binding this to the publish env to require approvals before run.
    # Further jobs are follow-ups to the release and are not required to be approved once release is approved.
    environment: publish

    needs:
      - setup
      - mark-as-success

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch }}
          fetch-tags: true
          token: ${{ secrets.ALL_REPO_PAT }}

      - name: Setup git
        run: |
          # NOTE: The user email is {user.id}+{user.login}@users.noreply.github.com.
          # See users API: https://api.github.com/users/github-actions%5Bbot%5D
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check tests passed
        run: |
          testsPassed=`curl -s -X GET "https://api.supertokens.io/0/driver?password=${{ secrets.SUPERTOKENS_API_KEY }}&version=${{ needs.setup.outputs.setupVersion }}&name=python" -H 'api-version: 0'`

          if [[ $(echo $testsPassed | jq .testPassed) != "true" ]]
          then
            echo "All tests have not passed. Exiting."
            exit 1
          fi

      - if: inputs.skip-other-version-checks != true
        name: Check if core and frontend released
        run: |
          canReleaseSafelyResponse=`curl -s -X GET "https://api.supertokens.io/0/driver/release/check?password=${{ secrets.SUPERTOKENS_API_KEY }}&version=${{ needs.setup.outputs.setupVersion }}&name=python" -H 'api-version: 0'`

          if [[ $(echo $canReleaseSafelyResponse | jq .canRelease) != "true" ]]
          then
            echo "Cannot release. Have you released corresponding core and frontend?"
            exit 1
          fi

      - uses: miniscruff/changie-action@v2
        with:
          version: latest

      - name: Update changelog for release
        run: |
          version_file=".changes/${{ needs.setup.outputs.releaseTag }}.md"

          if [[ -f "$version_file" ]]; then
            # Normal path: dev-sync already batched fragments and bumped the version.
            # Just regenerate CHANGELOG.md to ensure it's in sync.
            changie merge
          else
            # Safety net: direct/hotfix release that bypassed the dev-sync PR.
            # Batch fragments now and apply version replacements.
            changie batch ${{ needs.setup.outputs.releaseTag }}
            changie merge
          fi

          git add .changes/ CHANGELOG.md setup.py supertokens_python/constants.py
          git diff --staged --quiet || git commit -m "chore: update changelog for ${{ needs.setup.outputs.releaseTag }}"
          git push origin ${{ needs.setup.outputs.branch }}


      - name: Mark for release
        run: |
          curl --fail-with-body -X PATCH \
              https://api.supertokens.io/0/driver \
              -H 'Content-Type: application/json' \
              -H 'api-version: 0' \
              -d "{
                  \"password\": \"${{ secrets.SUPERTOKENS_RELEASE_API_KEY }}\",
                  \"name\":\"python\",
                  \"version\":\"${{ needs.setup.outputs.setupVersion }}\",
                  \"release\": true
              }"

      - name: Create release tag
        run: |
          git tag ${{ needs.setup.outputs.releaseTag }}
          git push --tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.ALL_REPO_PAT }}
        run: |
          # Strip the version header line and leading blank lines for the release body
          notes=$(sed '1d' .changes/v${{ needs.setup.outputs.setupVersion }}.md | sed '/./,$!d')
          gh release create "${{ needs.setup.outputs.releaseTag }}" \
            --title "Python SDK ${{ needs.setup.outputs.setupVersion }}" \
            --notes "$notes"


  merge:
    runs-on: ubuntu-latest
    needs:
      - setup
      - release

    outputs:
      isLatest: ${{ steps.merge-check.outputs.isLatest }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch }}
          # Need a complete fetch to make the master merge work
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.ALL_REPO_PAT }}

      - name: Setup git
        run: |
          # NOTE: The user email is {user.id}+{user.login}@users.noreply.github.com.
          # See users API: https://api.github.com/users/github-actions%5Bbot%5D
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check API and merge to master
        id: merge-check
        run: |
          response=`curl -s -X GET "https://api.supertokens.io/0/driver/latest/check?password=${{ secrets.SUPERTOKENS_API_KEY }}&version=${{ needs.setup.outputs.setupVersion }}&name=python" -H 'api-version: 0'`
          isLatest=$(echo $response | jq .isLatest)

          echo "isLatest=$isLatest" | tee -a "$GITHUB_OUTPUT" "$GITHUB_ENV"

          if [[ $isLatest == "true" ]]
          then
            git checkout master
            git checkout ${{ needs.setup.outputs.branch }}

            git merge master
            git checkout master
            git merge ${{ needs.setup.outputs.branch }}
            git push
            git checkout ${{ needs.setup.outputs.branch }}
          fi

      - name: Sync dev with release
        # Keep dev in sync after release so that:
        #   - batched fragments are removed from dev's unreleased/
        #   - dev's setup.py and constants.py reflect the released version
        #   - the next dev-sync PR computes the correct next version
        #
        # Only runs for the latest version — older branch patches don't touch dev.
        if: steps.merge-check.outputs.isLatest == 'true'
        run: |
          git fetch origin dev
          git checkout dev
          git merge ${{ needs.setup.outputs.branch }} --no-ff \
            -m "chore: sync dev after ${{ needs.setup.outputs.releaseTag }}"
          git push origin dev
          git checkout ${{ needs.setup.outputs.branch }}

  publish-docs:
    runs-on: ubuntu-latest
    needs:
      - setup
      - release
      - merge

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.releaseTag }}
          fetch-tags: true
          path: supertokens-python

      - uses: actions/checkout@v4
        with:
          repository: supertokens/supertokens-backend-website
          token: ${{ secrets.ALL_REPO_PAT }}
          path: supertokens-backend-website

      - run: |
          shopt -s extglob # Enable extended globbing

          if [[ "${{ needs.merge.outputs.isLatest }}" == "true" ]]
          then
            # Delete everything except the version folders
            rm -rf supertokens-backend-website/app/docs/sdk/docs/python/!(*.*.X)
            # Copy files to the root dir
            cp -r supertokens-python/html/supertokens_python/* supertokens-backend-website/app/docs/sdk/docs/python/
          fi

          # Delete the current version folder if it exists
          rm -rf supertokens-backend-website/app/docs/sdk/docs/python/${{ needs.setup.outputs.versionFolder }}
          # Copy the current docs
          mkdir -p supertokens-backend-website/app/docs/sdk/docs/python/${{ needs.setup.outputs.versionFolder }}
          cp -r supertokens-python/html/supertokens_python/* supertokens-backend-website/app/docs/sdk/docs/python/${{ needs.setup.outputs.versionFolder }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.setup.outputs.artifactName }}
          path: supertokens-backend-website/app/docs/sdk/docs/python

      - name: Trigger the backend website CI
        uses: actions/github-script@v7
        with:
          # NOTE: We should use a better scoped PAT here.
          github-token: ${{ secrets.ALL_REPO_PAT }}
          script: |
            github.rest.actions.createWorkflowDispatch({
                owner: 'supertokens',
                repo: 'supertokens-backend-website',
                workflow_id: 'release-python-documentation-changes.yml',
                ref: 'master',
                inputs: {
                  "version": `${{ needs.setup.outputs.setupVersion }}`,
                  "artifact-name": `${{ needs.setup.outputs.artifactName }}`,
                  "version-folder": `app/docs/sdk/docs/python`,
                  "run-id": `${{ github.run_id }}`,
                  "stage":  "production",
                }
              })

  publish:
    runs-on: ubuntu-latest
    environment: publish
    needs:
      - setup
      - release

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.releaseTag }}
          fetch-tags: true

      - run: |
          python3 -m pip install pip setuptools packaging poetry clikit --upgrade
          make dev-install
          pip install setuptools wheel twine
          python setup.py sdist bdist_wheel
          twine upload -u ${{ secrets.TWINE_USERNAME }} -p ${{ secrets.TWINE_PASSWORD }} dist/*
