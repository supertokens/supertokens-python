name: "Website Tests"

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled
  push:
    branches:
      - '[0-9]+.[0-9]+'

# Only one instance of this workflow will run on the same ref (PR/Branch/Tag)
# Previous runs will be cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  skip-check:
    runs-on: ubuntu-latest
    outputs:
      should-skip: ${{ steps.skip.outputs.should_skip }}
    steps:
      - uses: fkirc/skip-duplicate-actions@v5
        id: skip
        with:
          paths: '["supertokens_python/**", "tests/**", "*.cfg", "*.toml"]'
          skip_after_successful_duplicate: 'true'

  define-versions:
    if: |
      needs.skip-check.outputs.should-skip != 'true' &&
      (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-tests'))
    needs: skip-check
    runs-on: ubuntu-latest
    outputs:
      cdiVersions: ${{ steps.versions.outputs.cdiVersions }}
      nodeFdiVersionMap: ${{ steps.node-versions.outputs.fdiVersions }}
      websiteFdiVersionMap: ${{ steps.website-versions.outputs.fdiVersions }}
      coreCdiVersionMap: ${{ steps.core-versions.outputs.cdiVersions }}
      testMatrix: ${{ steps.matrix.outputs.testMatrix }}
    steps:
      - uses: actions/checkout@v4

      - uses: supertokens/get-supported-versions-action@main
        id: versions
        with:
          has-fdi: true
          has-cdi: true

      - uses: supertokens/actions/get-versions-from-repo@main
        id: website-versions
        with:
          repo: supertokens-website
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fdi-versions: ${{ steps.versions.outputs.fdiVersions }}

      - uses: supertokens/actions/get-versions-from-repo@main
        id: node-versions
        with:
          repo: supertokens-node
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fdi-versions: ${{ steps.versions.outputs.fdiVersions }}

      - uses: supertokens/actions/get-versions-from-repo@main
        id: core-versions
        with:
          repo: supertokens-core
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cdi-versions: ${{steps.versions.outputs.cdiVersions }}

      - name: Compute boundary test matrix
        id: matrix
        run: |
          py_versions='["3.8", "3.13"]'
          fdi_versions='${{ steps.versions.outputs.fdiVersions }}'
          frameworks='["django2x","django3x","drf_sync","drf_async","fastapi","flask","flask-nest-asyncio"]'
          latest_fdi=$(echo "$fdi_versions" | jq -r '.[-1]')
          latest_py="3.13"

          # All Python versions × all frameworks × latest FDI (covers Python and framework compat)
          boundary=$(jq -nc \
            --argjson pys "$py_versions" \
            --argjson fws "$frameworks" \
            --arg fdi "$latest_fdi" \
            '[$pys[] | . as $py | $fws[] | {"py-version": $py, "framework": ., "fdi-version": $fdi}]')

          # All other FDI versions × latest Python × fastapi (covers FDI compat, avoids duplicates)
          extra=$(echo "$fdi_versions" | jq \
            --arg py "$latest_py" \
            --arg latest "$latest_fdi" \
            '[.[] | select(. != $latest) | {"py-version": $py, "framework": "fastapi", "fdi-version": .}]')

          testMatrix=$(jq -nc --argjson a "$boundary" --argjson b "$extra" \
            '{"include": ($a + $b)}')

          echo "testMatrix=$testMatrix" >> $GITHUB_OUTPUT

  test:
    if: |
      needs.skip-check.outputs.should-skip != 'true' &&
      (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-tests'))
    runs-on: ubuntu-latest
    needs: [skip-check, define-versions]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.define-versions.outputs.testMatrix) }}

    steps:
      - name: Setup ENVs
        id: envs
        run: |
          APP_SERVER_LOG_DIR=${{ github.workspace }}/logs
          echo "APP_SERVER_LOG_DIR=$APP_SERVER_LOG_DIR" | tee -a "$GITHUB_OUTPUT" "$GITHUB_ENV"

          mkdir -p $APP_SERVER_LOG_DIR

      - uses: actions/checkout@v4
        with:
          # Checking out to a custom path since the test repo will also be cloned
          path: supertokens-python

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py-version }}

      - name: Get versions from current FDI/CDI version
        id: versions
        run: |
          latestCdiVersion=$(echo '${{ needs.define-versions.outputs.cdiVersions }}' | jq -r '.[-1]' | sed -e 's/"/\\"/g')
          coreVersion=$(echo '${{ needs.define-versions.outputs.coreCdiVersionMap }}' | jq -r ".[\"$latestCdiVersion\"]")
          nodeVersion=$(echo '${{ needs.define-versions.outputs.nodeFdiVersionMap }}' | jq -r '.["${{ matrix.fdi-version }}"]')
          websiteVersion=$(echo '${{ needs.define-versions.outputs.websiteFdiVersionMap }}' | jq -r '.["${{ matrix.fdi-version }}"]')

          echo "coreVersion=${coreVersion}" >> $GITHUB_OUTPUT
          echo "nodeVersion=${nodeVersion}" >> $GITHUB_OUTPUT
          echo "websiteVersion=${websiteVersion}" >> $GITHUB_OUTPUT

      - name: Start core
        working-directory: supertokens-python
        env:
          SUPERTOKENS_CORE_VERSION: ${{ steps.versions.outputs.coreVersion }}
        run: docker compose up --wait

      - name: Setup venv
        working-directory: supertokens-python
        run: |
          python3 -m venv venv
          source venv/bin/activate
          python3 -m pip install pip setuptools --upgrade

      - name: Install dependencies and start servers
        working-directory: supertokens-python
        run: |
          source venv/bin/activate
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          LOG="${{ steps.envs.outputs.APP_SERVER_LOG_DIR }}"

          case "${{ matrix.framework }}" in
            django2x)
              make with-django2x
              if [[ "${{ matrix.py-version }}" == "3.13" ]]; then pip install legacy-cgi; fi
              cd tests/frontendIntegration/django2x
              gunicorn mysite.wsgi --bind 0.0.0.0:8080 &> $LOG/app-server.log &
              gunicorn mysite.wsgi --bind 0.0.0.0:8082 &> $LOG/app-server-cross-domain.log &
              ;;
            django3x)
              make with-django
              cd tests/frontendIntegration/django3x
              uvicorn mysite.asgi:application --port 8080 &> $LOG/app-server.log &
              uvicorn mysite.asgi:application --port 8082 &> $LOG/app-server-cross-domain.log &
              ;;
            drf_sync)
              make with-drf
              cd tests/frontendIntegration/drf_sync
              gunicorn mysite.wsgi --bind 0.0.0.0:8080 &> $LOG/app-server.log &
              gunicorn mysite.wsgi --bind 0.0.0.0:8082 &> $LOG/app-server-cross-domain.log &
              ;;
            drf_async)
              make with-drf
              cd tests/frontendIntegration/drf_async
              uvicorn mysite.asgi:application --port 8080 &> $LOG/app-server.log &
              uvicorn mysite.asgi:application --port 8082 &> $LOG/app-server-cross-domain.log &
              ;;
            fastapi)
              make with-fastapi
              cd tests/frontendIntegration/fastapi-server
              uvicorn app:app --host 0.0.0.0 --port 8080 &> $LOG/app-server.log &
              uvicorn app:app --host 0.0.0.0 --port 8082 &> $LOG/app-server-cross-domain.log &
              ;;
            flask)
              make with-flask
              cd tests/frontendIntegration/flask-server
              python3 app.py --port 8080 &> $LOG/app-server.log &
              python3 app.py --port 8082 &> $LOG/app-server-cross-domain.log &
              ;;
            flask-nest-asyncio)
              make with-flask
              python -m pip install nest-asyncio
              cd tests/frontendIntegration/flask-server
              python3 app.py --port 8080 &> $LOG/app-server.log &
              python3 app.py --port 8082 &> $LOG/app-server-cross-domain.log &
              ;;
          esac

      - uses: supertokens/website-testing-action@main
        with:
          version: ${{ steps.versions.outputs.websiteVersion }}
          node-sdk-version: ${{ steps.versions.outputs.nodeVersion }}
          path: supertokens-website
          check-name-suffix: '[Py=${{ matrix.py-version }}][FDI=${{ matrix.fdi-version }}][Framework=${{ matrix.framework }}]'
          app-server-logs: ${{ steps.envs.outputs.APP_SERVER_LOG_DIR }}

  test-gate:
    runs-on: ubuntu-latest
    needs: [test]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Evaluate test requirement
        env:
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
          TEST_RESULT: ${{ needs.test.result }}
        run: |
          has_run_tests=$(echo "$LABELS"    | jq 'contains(["run-tests"])')
          has_skip_tests=$(echo "$LABELS"   | jq 'contains(["skip-tests"])')

          if [[ "$has_skip_tests" == "true" ]]; then
            echo "Tests explicitly skipped via 'skip-tests' label."
            exit 0
          elif [[ "$has_run_tests" == "true" ]]; then
            if [[ "$TEST_RESULT" == "success" || "$TEST_RESULT" == "skipped" ]]; then
              echo "Tests passed (result: $TEST_RESULT)."
              exit 0
            else
              echo "::error::Tests did not pass (result: $TEST_RESULT)."
              exit 1
            fi
          else
            echo "::error::No test label found. Add 'run-tests' to run tests, or 'skip-tests' to explicitly bypass."
            exit 1
          fi
