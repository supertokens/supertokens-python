name: "Website Tests"

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  push:
    branches:
      - master
      - "v[0-9]+.[0-9]+"
    tags:
      - "(dev-)?v[0-9]+.[0-9]+.[0-9]+"

jobs:
  define-versions:
    runs-on: ubuntu-latest
    outputs:
      fdiVersions: ${{ steps.versions.outputs.fdiVersions }}
      cdiVersions: ${{ steps.versions.outputs.cdiVersions }}
      pyVersions: '["3.8", "3.13"]'
    steps:
      - uses: actions/checkout@v4
      - uses: supertokens/get-supported-versions-action@main
        id: versions
        with:
          has-fdi: true
          has-cdi: true

  test:
    runs-on: ubuntu-latest
    needs: define-versions
    strategy:
      fail-fast: false
      matrix:
        py-version: ${{ fromJSON(needs.define-versions.outputs.pyVersions) }}
        # fdi-version: ${{ fromJSON(needs.define-versions.outputs.fdiVersions) }}
        fdi-version:
          - '4.0'
        framework:
          - django2x
          # - django3x
          # - drf_sync
          # - drf_async
          # - fastapi
          # - flask
          # - flask-nest-asyncio

    steps:
      - uses: actions/checkout@v4
        with:
          path: supertokens-python

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py-version }}

      - uses: supertokens/get-versions-action@main
        id: versions
        with:
          driver-name: python
          fdi-version: ${{ matrix.fdi-version }}
        env:
          SUPERTOKENS_API_KEY: ${{ env.SUPERTOKENS_API_KEY }}

      - name: Start core
        working-directory: supertokens-python
        run: docker compose up --wait

      - name: Install dependencies and start servers (django2x)
        if: matrix.framework == 'django2x'
        working-directory: supertokens-python
        run: |
          source venv/bin/activate

          make with-django2x

          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          cd tests/frontendIntegration/django2x

          gunicorn mysite.wsgi --bind 0.0.0.0:8080 &
          gunicorn mysite.wsgi --bind 0.0.0.0:8082 &

      - uses: supertokens/website-testing-action@main
        with:
          version: ${{ steps.versions.outputs.frontendVersionXy }}
          # version: ci/github-actions/website/20.1
          node-sdk-version: ${{ steps.versions.outputs.nodeTag }}
          path: supertokens-website
          check-name-suffix: '[Py=${{ matrix.py-version }}][FDI=${{ matrix.fdi-version }}][Framework=${{ matrix.framework }}]'
